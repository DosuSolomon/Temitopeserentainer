
services:
  # Backend API Service
  - name: song-request-backend
    type: web
    env: node
    region: oregon
    buildCommand: npm install && cd server && npm install && npx prisma generate && npx prisma db push
    startCommand: cd server && node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          database: temitopeserentainer
          endpoint: postgresql://temitopeserentainer:soaXi6ZxAJHMayNQZakPLUjZij5Lnj4r@dpg-d6lq2cc50q8c73a8t9ig-a:5432/temitopeserentainer
          # Or paste your connection string directly:
          # value: postgresql://temitopeserentainer:soaXi6ZxAJHMayNQZakPLUjZij5Lnj4r@dpg-d6lq2cc50q8c73a8t9ig-a:5432/temitopeserentainer
      - key: NODE_ENV
        value: production
    disk:
      enabled: false
    scaling:
      minInstances: 1
      maxInstances: 1

